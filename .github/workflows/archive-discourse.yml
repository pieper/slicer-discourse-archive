name: Archive Slicer Discourse

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      full_archive:
        description: 'Force full re-archive (ignores previous state)'
        required: false
        default: false
        type: boolean

  # Run on push to main (for testing)
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/archive-discourse.yml'
      - 'scripts/**'

# Serialize archive runs: a long full-archive job and a daily incremental
# can't both try to push at the same time. New triggers queue behind the
# in-flight one rather than racing it. (cancel-in-progress=false because
# we want both runs to complete and update the archive.)
concurrency:
  group: archive-discourse
  cancel-in-progress: false

jobs:
  archive:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Allow pushing to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better diff tracking

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run discourse archiver (incremental)
        if: ${{ github.event.inputs.full_archive != 'true' }}
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
        run: |
          python scripts/fetch_discourse.py \
            --url https://discourse.slicer.org \
            --target-dir ./archive \
            --debug
        continue-on-error: true

      - name: Run discourse archiver (full)
        if: ${{ github.event.inputs.full_archive == 'true' }}
        env:
          DISCOURSE_API_KEY: ${{ secrets.DISCOURSE_API_KEY }}
          DISCOURSE_API_USERNAME: ${{ secrets.DISCOURSE_API_USERNAME }}
        run: |
          python scripts/fetch_discourse.py \
            --url https://discourse.slicer.org \
            --target-dir ./archive \
            --full \
            --debug
        continue-on-error: true

      - name: Post-process archive
        run: python scripts/post_process.py
        continue-on-error: true

      - name: Generate index
        run: |
          TOPIC_COUNT=$(find archive/rendered-topics -type f -name "*.md" 2>/dev/null | wc -l | tr -d ' ')
          JSON_COUNT=$(find archive/posts -type f -name "*.json" 2>/dev/null | wc -l | tr -d ' ')

          cat > archive/INDEX.md << EOF
          # Slicer Discourse Archive Index

          Last updated: $(date -u +'%Y-%m-%d %H:%M UTC')

          ## Archive Contents

          - Total rendered topics: $TOPIC_COUNT
          - Raw JSON files: ${JSON_COUNT:-0}

          ## Recent Topics

          EOF

          find archive/rendered-topics -type f -name "*.md" 2>/dev/null \
            | xargs ls -t 2>/dev/null | head -50 \
            | while read filepath; do
              filename=$(basename "$filepath")
              topic_title=$(echo "$filename" | sed 's/^[0-9-]*-//' | sed 's/-id[0-9]*\.md$//' | tr '-' ' ')
              echo "- [$topic_title]($filepath)" >> archive/INDEX.md
            done || true

      - name: Check for changes
        id: check_changes
        run: |
          git add archive/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No new archive content"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            CHANGED_FILES=$(git diff --staged --name-only | wc -l | tr -d ' ')
            echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
            echo "Found $CHANGED_FILES changed files"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Discourse Archive Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED_FILES="${{ steps.check_changes.outputs.changed_files }}"
          git commit -m "Archive update: $CHANGED_FILES files modified on $(date +'%Y-%m-%d')"

          # Resolve a single rebase attempt. Returns:
          #   0 — pushed successfully
          #   1 — push failed, retry from the top
          #   2 — conflict outside archive/, fatal (do not retry)
          attempt_push() {
            if git pull --rebase origin main; then
              git push origin main && return 0
              return 1
            fi
            # Rebase hit a conflict. The two runs almost certainly touched the
            # same auto-generated archive files (INDEX.md, .archive_state.json,
            # per-month README.md). Take this run's version for everything
            # under archive/ — it reflects the freshest API data we just
            # fetched. A conflict outside archive/ would be unexpected (the
            # bot only writes archive/) so bail out loudly there.
            conflicted=$(git diff --name-only --diff-filter=U)
            outside=$(printf '%s\n' "$conflicted" | grep -v '^archive/' || true)
            if [ -n "$outside" ]; then
              echo "Unexpected rebase conflict outside archive/:" >&2
              printf '%s\n' "$outside" >&2
              git rebase --abort
              return 2
            fi
            echo "Resolving conflicts under archive/ by taking this run's version:"
            printf '  %s\n' $conflicted
            git checkout --theirs -- $conflicted
            git add -- $conflicted
            if ! GIT_EDITOR=true git rebase --continue; then
              git rebase --abort
              return 1
            fi
            git push origin main && return 0
            return 1
          }

          for attempt in 1 2 3 4 5; do
            attempt_push
            rc=$?
            if [ $rc -eq 0 ]; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            if [ $rc -eq 2 ]; then
              exit 1
            fi
            echo "Push attempt $attempt failed, retrying in $((attempt * 5))s..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1

      - name: Create summary
        if: always()
        run: |
          echo "## Archive Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Changed files**: ${{ steps.check_changes.outputs.changed_files || '0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.check_changes.outputs.has_changes == 'true' && '✅ Updated' || '📝 No changes' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Archive location**: [View archive](https://github.com/${{ github.repository }}/tree/main/archive)" >> $GITHUB_STEP_SUMMARY
